# nginx-конфиг сайта МПК-доска. Ставится в /etc/nginx/sites-available/mpk-doska,
# symlink в sites-enabled. Пока только HTTP (port 80) — HTTPS добавит certbot на cutover:
#   certbot --nginx -d mpk-doska.ru -d www.mpk-doska.ru
# Образец — agblabai. НЕ default_server (им владеет agblabai); явный server_name выигрывает.
server {
    listen 80;
    listen [::]:80;
    server_name mpk-doska.ru www.mpk-doska.ru;

    root /var/www/mpk-doska;
    index index.html;

    location / { try_files $uri $uri/ =404; }

    location /api/ {
        client_max_body_size 5m;
        proxy_pass http://127.0.0.1:8082;          # нейропродавец доски (agb-sales-mpk)
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_read_timeout 60s;
    }
}
